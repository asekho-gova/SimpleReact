{{- if .Values.kibana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "simplereact-observability.fullname" . }}-kibana
  labels:
    {{- include "simplereact-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
    - name: http
      port: {{ .Values.kibana.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    {{- include "simplereact-observability.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
{{- end }}
