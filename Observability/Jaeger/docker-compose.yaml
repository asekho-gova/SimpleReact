version: '3.7'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"   # Jaeger agent accepts spans via Thrift compact protocol
      - "6832:6832/udp"   # Jaeger agent accepts spans via Thrift binary protocol
      - "5778:5778"       # Jaeger agent serves configs
      - "16686:16686"     # Jaeger UI
      - "14268:14268"     # Jaeger collector accepts spans directly from clients
      - "14250:14250"     # Jaeger collector accepts spans in model.proto format
      - "9411:9411"       # Zipkin compatible endpoint
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - simplereact-network

  # Alternative: Elasticsearch and Kibana for more advanced observability
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - simplereact-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - simplereact-network

networks:
  simplereact-network:
    driver: bridge

volumes:
  esdata:
    driver: local
